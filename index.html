<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI日記コーチ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #0f0f1a; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .card { background: #1a1a2e; border-radius: 24px; padding: 36px 28px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
    .emoji { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #fff; }
    .sub { font-size: 14px; color: #aaa; margin-bottom: 32px; line-height: 1.7; }
    .steps { text-align: left; margin-bottom: 32px; background: #12122a; border-radius: 16px; padding: 20px; }
    .step { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
    .step:last-child { margin-bottom: 0; }
    .step-num { background: #6c63ff; color: #fff; font-size: 13px; font-weight: 700; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .step-text { font-size: 14px; line-height: 1.7; color: #ddd; }
    .step-text strong { color: #fff; }
    .btn { display: block; width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; text-decoration: none; margin-bottom: 12px; transition: opacity 0.2s; }
    .btn:active { opacity: 0.8; }
    .btn-step1 { background: linear-gradient(135deg, #6c63ff, #48c774); color: #fff; }
    .btn-step2 { background: #2a2a3e; color: #ccc; font-size: 15px; }
    .divider { font-size: 12px; color: #555; margin: 4px 0 12px; }
    .note { font-size: 12px; color: #555; margin-top: 20px; line-height: 1.7; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #48c774; color: #fff; padding: 12px 24px; border-radius: 99px; font-size: 14px; font-weight: 600; transition: transform 0.3s ease; pointer-events: none; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="card">
  <div class="emoji">🌙</div>
  <h1>AI日記コーチ</h1>
  <p class="sub">ChatGPTがあなた専属の日記コーチになります。<br>2ステップで今日から始められます。</p>
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text"><strong>「プロンプトをコピー」</strong>ボタンを押す<br><span style="color:#888;font-size:13px;">コーチの設定が自動でコピーされます</span></div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text"><strong>「ChatGPTを開く」</strong>ボタンを押して<br>入力欄に<strong>貼り付けて送信</strong>するだけ！<br><span style="color:#888;font-size:13px;">iPhoneは長押し→貼り付け / PCはCtrl+V</span></div>
    </div>
  </div>
  <button class="btn btn-step1" onclick="copyPrompt()">📋 STEP1｜プロンプトをコピー</button>
  <p class="divider">↓ コピーしたら次へ</p>
  <a class="btn btn-step2" href="https://chatgpt.com/" target="_blank">💬 STEP2｜ChatGPTを開く</a>
  <p class="note">※ ChatGPTのアカウントが必要です（無料でOK）<br>※ 貼り付けたチャットをブックマークしておくと毎日使えます</p>
</div>
<div class="toast" id="toast">コピーしました！</div>
<script>
const P = "あなたは私の専属AI日記コーチです。今日からよろしくお願いします。\n\n毎日の出来事や気持ちを、会話しながら引き出してください。友達のような話し方で、短い質問を1つずつ投げかけてください。どんな内容でも否定せず温かく受け止めてください。\n\n私が「日記にして」と言ったら：\n📅 今日の日記\n今日のできごと：（3〜5行）\n今日の気持ち：（一言）\nコーチより：（励まし一言）\n\n私が「今週を振り返って」と言ったら：\n📊 今週よかったこと（3つ）/ がんばったこと（1〜2つ）/ 来週への一言\n\n私が「目標を設定したい」と言ったら目標を3つまで決めて、日記で自然に触れてください。\n\n私が「今月をまとめて」と言ったら月次まとめを作ってください。\n\n最初に必ずこう言ってください：\n「こんにちは！あなたの日記コーチだよ😊 今日からよろしくね！まず今日どんな一日だったか、なんでもいいから話してみて！」";
function copyPrompt() {
  navigator.clipboard.writeText(P).then(() => {
    showToast('コピーしました！次はSTEP2でChatGPTを開いて貼り付けてください 👇');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = P; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('コピーしました！次はSTEP2でChatGPTを開いて貼り付けてください 👇');
  });
}
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3500); }
</script>
</body>
</html>
